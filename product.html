<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blaz</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- JAVASCRIPT -->
    <script src="js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <!-- laptop navigation  -->

      <div class="laptop-navigation">
        <div class="logo-position">
          <a href="index.html"
            ><img class="logo" src="img/logoblaz.png" alt="blaz"
          /></a>
        </div>
        <nav>
          <ul class="roboto-shortcuts">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li>
              <a href="shopping.html"
                ><img
                  class="bag-icon"
                  src="img/bag-icon.png"
                  alt="shopping cart"
              /></a>
            </li>
          </ul>
        </nav>
      </div>
      <!-- mobile navigation-->
      <nav>
        <div class="mobile-navigation">
          <!-- shortcuts-->
          <div class="hamburger-menu">
            <img class="menu-icon" src="img/burger-icon.png" alt="close" />
            <ul class="links">
              <li class="roboto-shortcuts"><a href="index.html">Home</a></li>
              <li class="roboto-shortcuts">
                <a href="products.html">Products</a>
              </li>
            </ul>
          </div>
          <!--logo-->
          <a href="index.html"
            ><img class="logo" src="img/logoblaz.png" alt="blaz"
          /></a>
          <!--cart icon-->
          <a href="shopping.html"
            ><img class="bag-icon" src="img/bag-icon.png" alt="shopping cart"
          /></a>
        </div>
      </nav>
      <!-- end of mobile navigation-->
    </header>
    <main>
      <div class="price-page">
        <img class="product1" src="img/granna.jpg" alt="granna" />
        <div class="price-info">
          <h1 class="lexend-titles">Gränna</h1>
          <p class="quicksand-txt1">80 SEK</p>
          <p class="quicksand-txt">Digital poster printed in 300 gr paper</p>
          <p class="quicksand-txt">size: 30 x 45 cm</p>
          <div class="shopping-buttons">
            <button type="button" class="reduce-button">-</button>
            <input class="amount" type="text" value="1" />
            <button class="increase-button">+</button>
            <button class="buy-button">add</button>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <small>&copy; 2026 Antonia Blazquez</small>
    </footer>
  </body>
</html>
