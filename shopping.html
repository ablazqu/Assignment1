<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blaz</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- JavaScript-->
    <!-- <script src="js/script.js" defer></script>-->
    <script src="js/shopping.js" defer></script>
    <!--roboto font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@600&display=swap"
      rel="stylesheet"
    />
    <!-- font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lexend&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <!-- laptop navigation  -->

      <div class="laptop-navigation">
        <div class="logo-position">
          <a href="index.html"
            ><img class="logo" src="img/logoblaz.png" alt="blaz"
          /></a>
        </div>
        <nav>
          <ul class="roboto-shortcuts">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li>
              <a href="shopping.html"
                ><img
                  class="bag-icon"
                  src="img/bag-icon.png"
                  alt="shopping cart"
              /></a>
            </li>
          </ul>
        </nav>
      </div>

      <!-- mobile navigation-->
      <nav>
        <div class="mobile-navigation">
          <!-- shortcuts-->
          <div class="hamburger-menu">
            <img class="menu-icon" src="img/burger-icon.png" alt="close" />
            <ul class="links">
              <li class="roboto-shortcuts"><a href="index.html">Home</a></li>
              <li class="roboto-shortcuts">
                <a href="products.html">Products</a>
              </li>
            </ul>
          </div>
          <div class="logo-plus-bagIcon">
            <!--logo-->
            <a href="index.html"
              ><img class="logo" src="img/logoblaz.png" alt="blaz"
            /></a>
            <!--cart icon-->
            <a href="shopping.html"
              ><img class="bag-icon" src="img/bag-icon.png" alt="shopping cart"
            /></a>
          </div>
        </div>
      </nav>
      <!-- end of mobile navigation-->
    </header>
    <main class="content-position">
      <h1 class="lexend-titles">Your shopping cart!</h1>
      <div class="shop-info">
        <p class="quicksand-txt">Product</p>
        <p class="quicksand-txt">Price</p>
        <p class="quicksand-txt">Amount</p>
        <p class="quicksand-txt">Total</p>
      </div>
      <section class="shopping-products"></section>
      <div class="final-price">
      <h3 class="quicksand-txt">Total Price</h3>
      <p class="total-price">k</p>
      </div>

      <ol class="quicksand-txt">
        <li><a href="https://www.instagram.com/blazz._/"> @blazz._</a></li>
        <div>
          <li>
            <button class="show-contact">Contact</button>
            <p class="email">ablazaravena@gmail.com</p>
          </li>
        </div>
      </ol>
    </main>
    <footer>
      <small>&copy; 2026 Antonia Blazquez</small>
    </footer>
  </body>
</html>
