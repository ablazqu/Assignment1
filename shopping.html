<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blaz</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- JAVASCRIPT -->
    <script src="js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <!-- laptop navigation  -->

       <div class="laptop-navigation">    
      <div class="logo-position">
        <a href="index.html"
          ><img class="logo" src="img/logoblaz.png" alt="blaz"
        /></a>
      </div>
      <nav>
        <ul class="roboto-shortcuts">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li>
            <a href="shopping.html"
              ><img class="bag-icon" src="img/bag-icon.png" alt="shopping cart"
            /></a>
          </li>
        </ul>
      </nav>
    </div> 


      <!-- mobile navigation-->
      <!-- burger menu + logo + shop icon-->
      <nav>
        <div class="mobile-navigation">
          <!-- shortcuts-->
          <div class="hamburger-menu">
            <img class="menu-icon" src="img/burger-icon.png" alt="close" />
            <ul class="links">
              <li class="roboto-shortcuts"><a href="index.html">Home</a></li>
              <li class="roboto-shortcuts"><a href="products.html">Products</a></li>
            </ul>
          </div>
          <!--logo-->
          <a href="index.html"
            ><img class="logo" src="img/logoblaz.png" alt="blaz"
          /></a>
          <!--cart icon-->
          <a href="shopping.html"
            ><img class="bag-icon" src="img/bag-icon.png" alt="shopping cart"
          /></a>
        </div>
      </nav>
      <!-- end of mobile navigation-->
    </header>
    <main class="content-position">
        <h1 class="lexend-titles">Your shopping cart!</h1>
       <div class="shop-info">
          <p class="quicksand-txt">Product</p>
          <p class="quicksand-txt">Price</p>
         <p class="quicksand-txt">Amount</p>
          <p class="quicksand-txt">Total</p>
        </div> 
        <h3 class="quicksand-txt">Total Price</h3>
        <section class="shopping-products"></section>
        
    </main>
    <footer>
       <small>&copy; 2026 Antonia Blazquez</small> 
    </footer>
</body>
</html>
